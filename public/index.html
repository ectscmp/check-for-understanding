<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quiz App - Join Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="top-bar">
      <div>
        <h1>Quiz App</h1>
      </div>
      <div class="top-bar-actions">
        <button id="admin_btn">Admin Dashboard</button>
        <button id="themeToggle">🌙</button>
      </div>
    </header>

    <main>
      <div class="card">
        <h2 class="hide_on_join">Join a Quiz Room</h2>

        <input
          type="text"
          id="username"
          placeholder="Enter your name"
          class="hide_on_join"
        />

        <input
          type="text"
          id="room_code_input"
          placeholder="Enter room code"
          class="hide_on_join"
        />

        <button id="join_btn" class="hide_on_join">Join Room</button>

        <div><h2 id="status"></h2></div>
      </div>

      <!-- PUBLIC ROOMS LIST -->
      <div class="card hide_on_join">
        <h2>Public Rooms</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 15px">
          Join an open quiz room below or enter a private room code above
        </p>
        <button
          id="refreshRoomsBtn"
          style="margin-bottom: 15px; width: auto; padding: 8px 16px"
        >
          🔄 Refresh
        </button>
        <div id="publicRoomsList"></div>
      </div>

      <div id="game" style="display: none">
        <div class="card">
          <h2 id="question"></h2>
          <div id="answers"></div>
          <p
            id="progress"
            style="text-align: center; margin-top: 15px; color: #94a3b8"
          ></p>
        </div>
      </div>
    </main>

    <!-- Player Report will be dynamically inserted here -->
    <div id="playerReportContainer" class="hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/index.js"></script>

    <footer class="footer">
      <div class="footer-content">
        <h3 id="footer-text">Developed by Coby Hughes</h3>
        <a
          href="https://github.com/c-o-b-a-x"
          target="_blank"
          class="github-link"
        >
          <img
            src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
            alt="GitHub Logo"
            class="github-logo"
          />
        </a>
      </div>
    </footer>
  </body>
</html>
